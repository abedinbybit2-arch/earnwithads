<script type="text/babel">
const {useState, useEffect, useRef, useCallback, useMemo} = React;

// ════════════════════════════════════
// FIREBASE INIT
// ════════════════════════════════════
firebase.initializeApp({
  apiKey: "AIzaSyB3lYDIr8ElAWk-jwnOWxubtVS-TeSSyOg",
  authDomain: "uyguy-ab047.firebaseapp.com",
  projectId: "uyguy-ab047",
  storageBucket: "uyguy-ab047.firebasestorage.app",
  messagingSenderId: "297739792713",
  appId: "1:297739792713:web:72af3ba75fabcacb3caa98"
});
const auth = firebase.auth();
const db   = firebase.firestore();

// ════════════════════════════════════
// CONFIG
// ════════════════════════════════════
const CFG = {
  ADS_PER_CLICK:  10,
  EARN_PER_CLICK: 1.00,
  MIN_WITHDRAW:   50,
  REF_BONUS:      10,
  BOT_USERNAME:   'abedinearn_bot',
  MONETAG_ZONE:   'show_10803580',
};

// ─── Coupon Codes ───
// নতুন coupon এখানে যোগ করুন
const COUPON_CODES = {
  'ABEDIN': { bonus: 1000, label: '🎉 ABEDIN Special', emoji: '💎' },
};

// ════════════════════════════════════
// TELEGRAM
// ════════════════════════════════════
const TG           = window.Telegram?.WebApp || null;
const tgUser       = TG?.initDataUnsafe?.user || null;
const tgStartParam = TG?.initDataUnsafe?.start_param || null;

// ════════════════════════════════════
// FIRESTORE HELPERS
// ════════════════════════════════════
const uRef = uid => db.collection('adearn_users').doc(uid);

async function dbGet(uid) {
  try {
    const s = await uRef(uid).get();
    return s.exists ? s.data() : null;
  } catch(e) { console.error('dbGet:', e); return null; }
}

async function dbCreate(uid, tgData) {
  const snap = await uRef(uid).get();
  if (snap.exists) return snap.data();
  const refCode = 'REF' + uid.slice(0,7).toUpperCase();
  const doc = {
    uid,
    tgId:            tgData?.id          || null,
    tgUsername:      tgData?.username    || null,
    displayName:     tgData?.first_name  || 'User',
    tgPhotoUrl:      tgData?.photo_url   || null,
    refCode,
    refBy:           null,
    refCount:        0,
    refEarned:       0,
    balance:         0,
    totalEarned:     0,
    totalWithdrawn:  0,
    adsWatchedTotal: 0,
    adsThisRound:    0,
    clicksEarned:    0,
    // ── NEW fields ──
    adBtnClicks:     0,   // মোট কতবার "Watch Ad" button চেপেছে
    invalidClicks:   0,   // ad চলাকালীন invalid click count
    usedCoupons:     [],  // ব্যবহৃত coupon codes
    withdrawHistory: [],
    joinedAt:        Date.now(),
    lastSeen:        Date.now(),
  };
  await uRef(uid).set(doc);
  return doc;
}

async function dbApplyRef(uid, code) {
  if (!code) return false;
  code = code.trim().toUpperCase();
  const snap = await db.collection('adearn_users').where('refCode','==',code).limit(1).get();
  if (snap.empty || snap.docs[0].id === uid) return false;
  const refUid = snap.docs[0].id;
  const FI = firebase.firestore.FieldValue.increment;
  await uRef(uid).update({ refBy: refUid, balance: FI(CFG.REF_BONUS), totalEarned: FI(CFG.REF_BONUS) });
  await uRef(refUid).update({ refCount: FI(1), refEarned: FI(CFG.REF_BONUS), balance: FI(CFG.REF_BONUS), totalEarned: FI(CFG.REF_BONUS) }).catch(()=>{});
  return true;
}

// ─── Coupon Apply — reads from Firestore (admin panel এ create করা coupons) ───
async function dbApplyCoupon(uid, code) {
  code = (code || '').trim().toUpperCase();
  if (!code) return { ok: false, msg: 'Coupon code লিখুন!' };

  // First try hardcoded, then Firestore admin coupons
  let coupon = COUPON_CODES[code];
  if (!coupon) {
    try {
      const cfgSnap = await db.collection('adearn_config').doc('adearn_admin').get();
      const adminCoupons = cfgSnap.exists ? (cfgSnap.data().coupons || {}) : {};
      coupon = adminCoupons[code];
    } catch(e) { /* ignore */ }
  }
  if (!coupon) return { ok: false, msg: '❌ Invalid coupon code!' };

  const snap = await uRef(uid).get();
  const d = snap.data() || {};
  const used = d.usedCoupons || [];
  if (used.includes(code)) return { ok: false, msg: '⚠️ এই coupon আগেই ব্যবহার হয়েছে!' };

  const FI = firebase.firestore.FieldValue.increment;
  await uRef(uid).update({
    balance:      FI(coupon.bonus),
    totalEarned:  FI(coupon.bonus),
    usedCoupons:  firebase.firestore.FieldValue.arrayUnion(code),
    lastSeen:     Date.now(),
  });
  return { ok: true, bonus: coupon.bonus, label: coupon.label, emoji: coupon.emoji };
}

// ─── Record ad view (only if ad was actually shown) ───
async function dbRecordView(uid) {
  const snap = await uRef(uid).get();
  const d = snap.data() || {};
  const current = (d.adsThisRound || 0) + 1;
  const isClick  = current >= CFG.ADS_PER_CLICK;
  const FI = firebase.firestore.FieldValue.increment;
  const upd = {
    adsWatchedTotal: FI(1),
    adsThisRound: isClick ? 0 : current,
    lastSeen: Date.now(),
  };
  if (isClick) {
    upd.balance      = FI(CFG.EARN_PER_CLICK);
    upd.totalEarned  = FI(CFG.EARN_PER_CLICK);
    upd.clicksEarned = FI(1);
  }
  await uRef(uid).update(upd);
  return { isClick, earned: isClick ? CFG.EARN_PER_CLICK : 0 };
}

// ─── Record button click (every time Watch Ad btn is pressed) ───
async function dbRecordAdBtnClick(uid) {
  try {
    const FI = firebase.firestore.FieldValue.increment;
    await uRef(uid).update({ adBtnClicks: FI(1) });
  } catch(e) { console.warn('adBtnClick record:', e); }
}

// ─── Record invalid click ───
async function dbRecordInvalidClick(uid) {
  try {
    const FI = firebase.firestore.FieldValue.increment;
    await uRef(uid).update({ invalidClicks: FI(1) });
  } catch(e) { console.warn('invalidClick record:', e); }
}

// ─── Leaderboard: top 20 by totalEarned ───
async function dbLeaderboard() {
  try {
    const snap = await db.collection('adearn_users')
      .orderBy('totalEarned', 'desc').limit(20).get();
    return snap.docs.map(d => d.data());
  } catch(e) { console.error('leaderboard:', e); return []; }
}

// ─── All withdraw requests (all users) ───
async function dbAllWithdraws() {
  try {
    const snap = await db.collection('adearn_users').get();
    const all = [];
    snap.docs.forEach(d => {
      const ud = d.data();
      const hist = ud.withdrawHistory || [];
      hist.forEach(w => {
        all.push({
          ...w,
          displayName: ud.displayName || 'User',
          // hide number: mask account
        });
      });
    });
    // sort by time desc
    all.sort((a,b) => (b.at||0) - (a.at||0));
    return all;
  } catch(e) { console.error('allWithdraws:', e); return []; }
}

async function dbWithdraw(uid, amount, method, account) {
  const snap = await uRef(uid).get();
  const d = snap.data() || {};
  if ((d.balance || 0) < amount)    return { ok: false, msg: 'Balance কম!' };
  if (amount < CFG.MIN_WITHDRAW)    return { ok: false, msg: `Minimum ৳${CFG.MIN_WITHDRAW} দরকার` };
  const entry = { id:`w_${Date.now()}`, amount, method, account, status:'pending', at: Date.now() };
  const FI = firebase.firestore.FieldValue.increment;
  await uRef(uid).update({
    balance:        FI(-amount),
    totalWithdrawn: FI(amount),
    withdrawHistory: firebase.firestore.FieldValue.arrayUnion(entry),
  });
  return { ok: true };
}

// ════════════════════════════════════
// AUTH
// ════════════════════════════════════
const tgEmail = id => `tg_${id}@adearn.app`;
const tgPass  = id => `ADP_${id}_secure`;

async function tgAuth(tgData) {
  const email = tgEmail(tgData.id);
  const pass  = tgPass(tgData.id);
  try {
    const c = await auth.signInWithEmailAndPassword(email, pass);
    await uRef(c.user.uid).update({
      lastSeen:    Date.now(),
      displayName: tgData.first_name || 'User',
      tgUsername:  tgData.username   || null,
      tgPhotoUrl:  tgData.photo_url  || null,
    }).catch(()=>{});
    return c.user;
  } catch(e) {
    if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential' || e.code === 'auth/invalid-email') {
      const c = await auth.createUserWithEmailAndPassword(email, pass);
      await dbCreate(c.user.uid, tgData);
      return c.user;
    }
    throw e;
  }
}

// ════════════════════════════════════
// UTILS
// ════════════════════════════════════
const fmt  = (n, d=2) => { if (!n && n!==0) return '0.00'; return parseFloat(n).toFixed(d); };
const copy = t => { try { navigator.clipboard.writeText(t); } catch {} };
const ago  = ts => {
  const s = Math.floor((Date.now()-ts)/1000);
  if (s < 60)    return `${s}s আগে`;
  if (s < 3600)  return `${Math.floor(s/60)}m আগে`;
  if (s < 86400) return `${Math.floor(s/3600)}h আগে`;
  return `${Math.floor(s/86400)}d আগে`;
};

function showMonetagAd() {
  try {
    const fn = window[CFG.MONETAG_ZONE];
    if (typeof fn === 'function') { fn(); return true; }
  } catch(e) { console.warn('Monetag:', e); }
  return false;
}

// ════════════════════════════════════
// TOAST HOOK
// ════════════════════════════════════
let _tid = 0;
function useToast() {
  const [toasts, set] = useState([]);
  const push = useCallback((msg, type='green') => {
    const id = ++_tid;
    set(p => [...p, {id, msg, type}]);
    setTimeout(() => set(p => p.filter(t => t.id !== id)), 3200);
  }, []);
  return { toasts, push };
}

// ════════════════════════════════════
// CONFETTI
// ════════════════════════════════════
function Confetti({ onDone }) {
  const pieces = useMemo(() =>
    [...Array(55)].map((_, i) => ({
      id: i,
      x: Math.random() * 100,
      size: Math.random() * 9 + 4,
      dur: (Math.random() * 2 + 1.5).toFixed(2),
      delay: (Math.random() * 1.2).toFixed(2),
      color: ['#22c55e','#86efac','#fbbf24','#60a5fa','#f472b6','#a78bfa','#fb923c'][i % 7],
      round: i % 3 === 0,
    })), []);
  useEffect(() => {
    const t = setTimeout(onDone, 4000);
    return () => clearTimeout(t);
  }, [onDone]);
  return (
    <>
      {pieces.map(p => (
        <div key={p.id} className="confetti" style={{
          left:`${p.x}%`, top:'-12px',
          width:p.size, height:p.size,
          background:p.color,
          borderRadius: p.round ? '50%' : '2px',
          transform:`rotate(${Math.random()*360}deg)`,
          animationDuration:`${p.dur}s`,
          animationDelay:`${p.delay}s`,
          boxShadow:`0 0 5px ${p.color}`,
        }}/>
      ))}
    </>
  );
}

// ════════════════════════════════════
// GOLD RAIN (Coupon bonus animation)
// ════════════════════════════════════
function GoldRain({ onDone }) {
  const drops = useMemo(() =>
    [...Array(40)].map((_, i) => ({
      id: i,
      x: Math.random() * 100,
      dur: (Math.random() * 2.5 + 1.5).toFixed(2),
      delay: (Math.random() * 1.5).toFixed(2),
      em: ['💰','💵','🪙','💎','✨','🌟'][i % 6],
      size: Math.random() * 10 + 14,
    })), []);
  useEffect(() => {
    const t = setTimeout(onDone, 5000);
    return () => clearTimeout(t);
  }, [onDone]);
  return (
    <>
      {drops.map(d => (
        <div key={d.id} className="gold-rain" style={{
          left:`${d.x}%`, top:'-30px',
          fontSize:`${d.size}px`,
          animationDuration:`${d.dur}s`,
          animationDelay:`${d.delay}s`,
        }}>{d.em}</div>
      ))}
    </>
  );
}

// PARTICLE BG
// ════════════════════════════════════
function ParticleBG() {
  const pts = useMemo(() =>
    [...Array(14)].map((_, i) => ({
      id:i, x:Math.random()*100,
      size:Math.random()*3+1,
      op:(Math.random()*0.25+0.08).toFixed(2),
      dur:(Math.random()*18+14).toFixed(1),
      del:(Math.random()*10).toFixed(1),
    })), []);
  return (
    <div style={{position:'fixed',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:0}}>
      {pts.map(p => (
        <div key={p.id} style={{
          position:'absolute', borderRadius:'50%',
          width:p.size, height:p.size,
          background:`rgba(34,197,94,${p.op})`,
          left:`${p.x}%`,
          animation:`particles ${p.dur}s linear ${p.del}s infinite`,
        }}/>
      ))}
      <div style={{position:'absolute',top:'15%',left:'50%',transform:'translateX(-50%)',width:'500px',height:'500px',borderRadius:'50%',background:'radial-gradient(circle,rgba(34,197,94,0.06),transparent 65%)',filter:'blur(50px)'}}/>
      <div style={{position:'absolute',bottom:'10%',right:'5%',width:'300px',height:'300px',borderRadius:'50%',background:'radial-gradient(circle,rgba(245,158,11,0.04),transparent 65%)',filter:'blur(40px)'}}/>
    </div>
  );
}

// COUPON BOX COMPONENT  ✨ NEW
// ════════════════════════════════════
function CouponBox({ user, onRefresh, push }) {
  const [code,         setCode]         = useState('');
  const [loading,      setLoading]      = useState(false);
  const [shakeKey,     setShakeKey]     = useState(0);
  const [showSuccess,  setShowSuccess]  = useState(false);
  const [successData,  setSuccessData]  = useState(null);
  const [showGoldRain, setShowGoldRain] = useState(false);
  const inputRef = useRef(null);

  const applyCoupon = async () => {
    if (!code.trim()) {
      setShakeKey(k => k+1);
      push('Coupon code লিখুন!', 'red');
      return;
    }
    if (!user) { push('Login করুন!', 'red'); return; }
    setLoading(true);
    const result = await dbApplyCoupon(user.uid, code);
    setLoading(false);

    if (result.ok) {
      setSuccessData(result);
      setShowSuccess(true);
      setShowGoldRain(true);
      setCode('');
      push(`🎉 Coupon applied! +৳${result.bonus} bonus!`, 'gold');
      await onRefresh();
    } else {
      setShakeKey(k => k+1);
      push(result.msg, 'red');
    }
  };

  return (
    <>
      {/* Gold rain on success */}
      {showGoldRain && <GoldRain onDone={() => setShowGoldRain(false)}/>}

      {/* Success modal */}
      {showSuccess && successData && (
        <div onClick={() => setShowSuccess(false)} style={{
          position:'fixed',inset:0,zIndex:9980,
          background:'rgba(0,0,0,0.82)',backdropFilter:'blur(10px)',
          display:'flex',alignItems:'center',justifyContent:'center'
        }}>
          <div onClick={e => e.stopPropagation()} className="bonus-pop-anim" style={{
            background:'linear-gradient(135deg,#1a0e00,#2d1a00,#1a0e00)',
            border:'1.5px solid rgba(245,158,11,0.55)',
            borderRadius:'30px',padding:'36px 28px',textAlign:'center',
            maxWidth:'310px',width:'90%',
            boxShadow:'0 0 80px rgba(245,158,11,0.35)',
            animation:'couponGlow 2s ease-in-out infinite, bonusPop 0.55s cubic-bezier(0.34,1.56,0.64,1) both',
          }}>
            <div style={{fontSize:'72px',marginBottom:'10px',display:'inline-block',animation:'coinPop 1.2s ease-in-out infinite'}}>
              {successData.emoji}
            </div>
            <div style={{
              background:'linear-gradient(135deg,#92400e,#b45309)',
              borderRadius:'999px',padding:'3px 16px',display:'inline-block',
              fontSize:'10px',fontWeight:900,color:'#fbbf24',
              letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:'12px'
            }}>
              {successData.label}
            </div>
            <h2 style={{fontSize:'28px',fontWeight:900,color:'white',marginBottom:'6px'}}>Bonus Applied!</h2>
            <p style={{fontSize:'13px',color:'rgba(148,163,184,0.6)',marginBottom:'22px'}}>
              তোমার balance এ যোগ হয়েছে
            </p>
            <div style={{
              background:'rgba(245,158,11,0.1)',
              border:'1.5px solid rgba(245,158,11,0.35)',
              borderRadius:'20px',padding:'20px',marginBottom:'22px',
            }}>
              <p style={{fontSize:'13px',color:'rgba(245,158,11,0.65)',fontWeight:700,marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.08em'}}>
                💰 Bonus Amount
              </p>
              <p style={{fontSize:'58px',fontWeight:900,color:'#fbbf24',lineHeight:1}}>
                +৳{fmt(successData.bonus,0)}
              </p>
            </div>
            <button className="btn-gold" style={{width:'100%',padding:'15px',borderRadius:'18px',fontSize:'15px'}}
              onClick={() => setShowSuccess(false)}>
              🚀 দারুণ! চালিয়ে যাই
            </button>
            <p style={{fontSize:'11px',color:'rgba(100,116,139,0.5)',marginTop:'10px'}}>tap anywhere to close</p>
          </div>
        </div>
      )}

      {/* Coupon Card */}
      <div style={{
        background:'linear-gradient(135deg,#1a0d00,#2a1500,#1a0d00)',
        border:'1.5px solid rgba(245,158,11,0.28)',
        borderRadius:'22px',padding:'18px',position:'relative',overflow:'hidden',
      }}>
        {/* Dashed line decoration */}
        <div style={{
          position:'absolute',top:'50%',left:'-8px',right:'-8px',height:'1px',
          background:'repeating-linear-gradient(90deg,rgba(245,158,11,0.2) 0,rgba(245,158,11,0.2) 6px,transparent 6px,transparent 14px)',
          transform:'translateY(-50%)',pointerEvents:'none',zIndex:0,
        }}/>
        {/* Left circle notch */}
        <div style={{position:'absolute',top:'50%',left:'-12px',width:'24px',height:'24px',borderRadius:'50%',background:'#030712',transform:'translateY(-50%)',zIndex:1}}/>
        {/* Right circle notch */}
        <div style={{position:'absolute',top:'50%',right:'-12px',width:'24px',height:'24px',borderRadius:'50%',background:'#030712',transform:'translateY(-50%)',zIndex:1}}/>

        <div style={{position:'relative',zIndex:2}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'14px'}}>
            <span style={{fontSize:'20px'}}>🎟️</span>

              <p style={{fontWeight:800,fontSize:'15px',color:'#fbbf24'}}>Coupon Code</p>

          <div key={shakeKey} className={shakeKey > 0 ? 'shake-anim' : ''} style={{display:'flex',gap:'8px'}}>
            <input
              ref={inputRef}
              className="cupon-inp"
              value={code}
              onChange={e => setCode(e.target.value.toUpperCase())}
              onKeyDown={e => e.key === 'Enter' && applyCoupon()}
              placeholder="Coupon code লিখুন..."
              maxLength={20}
            />
            <button
              className="btn-gold"
              style={{
                padding:'14px 18px',borderRadius:'14px',fontSize:'13px',
                whiteSpace:'nowrap',flexShrink:0,
              }}
              onClick={applyCoupon}
              disabled={loading}
            >
              {loading
                ? <span style={{display:'inline-block',width:'16px',height:'16px',border:'2px solid rgba(255,255,255,0.5)',borderTopColor:'white',borderRadius:'50%',animation:'spin360 .7s linear infinite'}}/>
                : '✅ Apply'}
            </button>
          </div>

          {/* Hint */}
          <p style={{fontSize:'11px',color:'rgba(245,158,11,0.4)',marginTop:'8px',textAlign:'center'}}>
            🔑 Special coupon code apply করলে একবারই পাবে
          </p>
        </div>
      </div>
    </>
  );
}

// AD WATCH PANEL
// ════════════════════════════════════
function AdWatchPanel({ userData, user, onRefresh, push }) {
  const [watching,      setWatching]      = useState(false);
  const [countdown,     setCountdown]     = useState(0);
  const [showCongrats,  setShowCongrats]  = useState(false);
  const [showConfetti,  setShowConfetti]  = useState(false);
  const [lastEarned,    setLastEarned]    = useState(0);
  // Invalid click flash state
  const [invalidFlash,  setInvalidFlash]  = useState(false);
  // Local invalid click count this session (from userData too)
  const timerRef    = useRef(null);
  const watchingRef = useRef(false);
  // Track if current ad was actually shown by Monetag
  const adShownRef  = useRef(false);

  useEffect(() => () => { if (timerRef.current) clearInterval(timerRef.current); }, []);

  const adsWatched = userData?.adsThisRound    || 0;
  const progress   = (adsWatched / CFG.ADS_PER_CLICK) * 100;
  const isLastAd   = adsWatched === CFG.ADS_PER_CLICK - 1;
  const remaining  = CFG.ADS_PER_CLICK - adsWatched;

  // Stats from Firestore
  const totalBtnClicks  = userData?.adBtnClicks  || 0;
  const totalInvalid    = userData?.invalidClicks || 0;

  if (!userData) return <div className="sk" style={{height:'260px',width:'100%'}}/>;

  const watchAd = async () => {
    // ─── Invalid click: already watching ───
    if (watchingRef.current) {
      // Record invalid click
      setInvalidFlash(true);
      setTimeout(() => setInvalidFlash(false), 1600);
      push('⚠️ Invalid Click! Ad চলাকালীন click করা যাবে না। কোনো point পাবে না!', 'red');
      if (user) await dbRecordInvalidClick(user.uid);
      await onRefresh();
      return;
    }

    watchingRef.current = true;
    setWatching(true);
    adShownRef.current = false;

    // ─── Record button click ───
    if (user) dbRecordAdBtnClick(user.uid);

    // ─── Show Monetag ad ───
    const adShown = showMonetagAd();
    adShownRef.current = adShown;

    if (!adShown) {
      // Ad didn't load — NO COUNT!
      push('❌ Ad load হয়নি! কোনো point count হবে না। আবার চেষ্টা করুন।', 'red');
      setWatching(false);
      watchingRef.current = false;
      await onRefresh();
      return;
    }

    // ─── Countdown ───
    let secs = isLastAd ? 8 : 5;
    setCountdown(secs);

    timerRef.current = setInterval(async () => {
      secs--;
      setCountdown(secs);
      if (secs <= 0) {
        clearInterval(timerRef.current);
        timerRef.current = null;
        try {
          const result = await dbRecordView(user.uid);
          await onRefresh();
          if (result.isClick) {
            setLastEarned(result.earned);
            setShowCongrats(true);
            setShowConfetti(true);
            push(`🎉 ৳${fmt(result.earned)} Earned!`, 'gold');
          } else {
            push(`✅ Ad ${adsWatched+1}/${CFG.ADS_PER_CLICK} — আর ${remaining-1}টা বাকি`);
          }
        } catch(e) {
          push('কিছু সমস্যা হয়েছে, আবার চেষ্টা করুন', 'red');
        }
        setWatching(false);
        watchingRef.current = false;
      }
    }, 1000);
  };

  return (
    <>
      {showConfetti && <Confetti onDone={() => setShowConfetti(false)}/>}

      {/* Congrats Modal */}
      {showCongrats && (
        <div onClick={() => setShowCongrats(false)} style={{position:'fixed',inset:0,zIndex:9980,background:'rgba(0,0,0,0.75)',backdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <div onClick={e => e.stopPropagation()} style={{
            background:'linear-gradient(135deg,#030f03,#071a07)',
            border:'1px solid rgba(34,197,94,0.5)',borderRadius:'28px',
            padding:'32px 24px',textAlign:'center',maxWidth:'300px',width:'90%',
            boxShadow:'0 0 60px rgba(34,197,94,0.35)',
            animation:'modalIn .5s cubic-bezier(0.34,1.56,0.64,1) both',
          }}>
            <div style={{fontSize:'68px',marginBottom:'8px',display:'inline-block',animation:'coinPop 1.2s ease-in-out infinite'}}>💰</div>
            <h2 style={{fontSize:'26px',fontWeight:900,color:'white',marginBottom:'6px'}}>Click Earned!</h2>
            <p style={{fontSize:'13px',color:'rgba(148,163,184,0.65)',marginBottom:'20px'}}>
              {CFG.ADS_PER_CLICK}টা ad দেখে ৳{fmt(CFG.EARN_PER_CLICK)} earn করেছো!
            </p>
            <div style={{background:'rgba(34,197,94,0.09)',border:'1px solid rgba(34,197,94,0.28)',borderRadius:'18px',padding:'18px',marginBottom:'20px'}}>
              <p style={{fontSize:'11px',color:'rgba(34,197,94,0.65)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:'6px'}}>Balance এ যোগ হয়েছে</p>
              <p style={{fontSize:'52px',fontWeight:900,color:'#22c55e',lineHeight:1}}>+৳{fmt(lastEarned)}</p>
            </div>
            <button className="btn-green" style={{width:'100%',padding:'14px',borderRadius:'18px',fontSize:'15px'}}
              onClick={() => setShowCongrats(false)}>
              🚀 আরো Ads দেখো!
            </button>
            <p style={{fontSize:'11px',color:'rgba(100,116,139,0.5)',marginTop:'10px'}}>tap anywhere to close</p>
          </div>
        </div>
      )}

      {/* Ad Card */}
      <div className={`ad-card ${watching ? 'active' : ''} ${invalidFlash ? 'invalid-flash' : ''}`}>
        {watching && [0,1,2].map(i => (
          <div key={i} className="ripple-ring" style={{
            width:'180px',height:'180px',top:'50%',left:'50%',
            marginTop:'-90px',marginLeft:'-90px',
            animationDelay:`${i*0.6}s`,
          }}/>
        ))}

        <div style={{position:'relative',zIndex:5,padding:'22px'}}>
          {/* Header row */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'12px'}}>
            <div>
              <p style={{fontWeight:900,fontSize:'17px',color:'white'}}>
                {watching ? '📺 Ad দেখা হচ্ছে...' : isLastAd ? '🎯 Click Ad!' : '📺 Ad দেখো'}
              </p>
              <p style={{fontSize:'12px',color:'rgba(148,163,184,0.55)',marginTop:'3px'}}>
                {watching
                  ? `${countdown} সেকেন্ড বাকি${isLastAd ? ' — click করো!' : ''}`
                  : isLastAd
                    ? '🔥 এই ১টাই দেখলেই ৳১ পাবে!'
                    : `আর ${remaining}টা দেখলে ৳${fmt(CFG.EARN_PER_CLICK)} Earn হবে`}
              </p>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <p style={{fontSize:'10px',color:'rgba(148,163,184,0.45)'}}>প্রতি click</p>
              <p style={{fontSize:'22px',fontWeight:900,color:'#22c55e'}}>৳{fmt(CFG.EARN_PER_CLICK)}</p>
            </div>
          </div>

          {/* ─── Click Stats Row (NEW) ─── */}
          <div style={{display:'flex',gap:'6px',marginBottom:'14px',flexWrap:'wrap'}}>
            <span className="click-badge">
              🖱️ মোট click: <strong>{totalBtnClicks}</strong>
            </span>
            {totalInvalid > 0 && (
              <span className="invalid-badge">
                ⚠️ Invalid: <strong>{totalInvalid}</strong>
              </span>
            )}
            {/* Ad shown status during watching */}
            {watching && (
              <span style={{
                display:'inline-flex',alignItems:'center',gap:'4px',
                padding:'3px 10px',borderRadius:'999px',fontSize:'11px',fontWeight:800,
                background:'rgba(34,197,94,0.1)',border:'1px solid rgba(34,197,94,0.3)',
                color:'#86efac',
              }}>
                ✅ Ad Loaded
              </span>
            )}
          </div>

          {/* Progress */}
          <div style={{marginBottom:'14px'}}>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'rgba(148,163,184,0.5)',marginBottom:'6px'}}>
              <span>Progress</span>
              <span style={{color:'#4ade80',fontWeight:700}}>{adsWatched} / {CFG.ADS_PER_CLICK} Ads</span>
            </div>
            <div className="prog-track" style={{height:'8px'}}>
              <div className="prog-fill" style={{width:`${progress}%`}}/>
            </div>
          </div>

          {/* Step dots */}
          <div style={{display:'flex',gap:'5px',justifyContent:'center',flexWrap:'wrap',marginBottom:'18px'}}>
            {[...Array(CFG.ADS_PER_CLICK)].map((_, i) => {
              const done    = i < adsWatched;
              const current = i === adsWatched && !watching;
              const isMoney = i === CFG.ADS_PER_CLICK - 1;
              return (
                <div key={i} className={`step-dot ${done?'done':current&&isMoney?'money':current?'current':isMoney?'money':''}`}>
                  {done ? '✓' : isMoney ? '💰' : i+1}
                </div>
              );
            })}
          </div>

          {/* Watching indicator */}
          {watching && (
            <div style={{background:'rgba(34,197,94,0.08)',border:'1px solid rgba(34,197,94,0.2)',borderRadius:'14px',padding:'14px',textAlign:'center',marginBottom:'14px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}>
                <div style={{width:'8px',height:'8px',borderRadius:'50%',background:'#22c55e',animation:'dotBlink 1s ease-in-out infinite'}}/>
                <p style={{fontSize:'13px',color:'#86efac',fontWeight:600}}>
                  {isLastAd ? '🖱️ Ad এ Click করো — ৳১ পাবে!' : '⏳ Ad দেখো, skip করো না!'}
                </p>
              </div>
              <p style={{fontSize:'28px',fontWeight:900,color:'#22c55e',marginTop:'6px'}}>{countdown}s</p>
            </div>
          )}

          {/* ─── Invalid click warning when watching ─── */}
          {watching && (
            <div style={{
              background:'rgba(239,68,68,0.07)',
              border:'1px solid rgba(239,68,68,0.2)',
              borderRadius:'12px',padding:'10px 14px',
              marginBottom:'14px',textAlign:'center',
            }}>
              <p style={{fontSize:'12px',color:'#fca5a5',fontWeight:600}}>
                🚫 Ad চলাকালীন আবার click করলে <strong>Invalid Click</strong> হবে — কোনো point পাবে না!
              </p>
            </div>
          )}

          {/* Action button */}
          {!watching && (
            <button
              className={isLastAd ? 'btn-gold' : 'btn-green'}
              style={{width:'100%',padding:'16px',borderRadius:'18px',fontSize:'16px',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'}}
              onClick={watchAd}>
              {isLastAd ? '💰 Click Ad করো — ৳১ Earn!' : '📺 Ad দেখো'}
            </button>
          )}

          {/* While watching — show locked button */}
          {watching && (
            <button
              style={{
                width:'100%',padding:'16px',borderRadius:'18px',fontSize:'14px',
                background:'rgba(239,68,68,0.1)',border:'1px solid rgba(239,68,68,0.3)',
                color:'rgba(239,68,68,0.7)',fontWeight:700,cursor:'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',
              }}
              onClick={watchAd}
            >
              🔒 এখন click করা যাবে না — Invalid Click!
            </button>
          )}
        </div>
      </div>
    </>
  );
}

// WITHDRAW PAGE
// ════════════════════════════════════
function WithdrawPage({ userData, user, onRefresh, push }) {
  const [amount,  setAmount]  = useState('');
  const [method,  setMethod]  = useState('bkash');
  const [account, setAccount] = useState('');
  const [loading, setLoading] = useState(false);

  if (!userData) return <div className="sk" style={{height:'320px'}}/>;

  const bal     = userData.balance || 0;
  const history = [...(userData.withdrawHistory || [])].reverse().slice(0, 15);

  const doWithdraw = async () => {
    const amt = parseFloat(amount);
    if (!amt || isNaN(amt))   { push('পরিমাণ লিখুন', 'red'); return; }
    if (!account.trim())      { push('Account নম্বর দিন', 'red'); return; }
    setLoading(true);
    const r = await dbWithdraw(user.uid, amt, method, account.trim());
    if (r.ok) {
      push('✅ Withdraw request পাঠানো হয়েছে! ২৪h এর মধ্যে পাবেন', 'gold');
      setAmount(''); setAccount('');
      await onRefresh();
    } else {
      push(r.msg, 'red');
    }
    setLoading(false);
  };

  const methods = [
    { id:'bkash',  label:'bKash',  ic:'🩷' },
    { id:'nagad',  label:'Nagad',  ic:'🧡' },
    { id:'rocket', label:'Rocket', ic:'💙' },
    { id:'bank',   label:'Bank',   ic:'🏦' },
  ];

  const statusColor = s => s==='paid'?'#22c55e':s==='rejected'?'#ef4444':'#f59e0b';
  const statusLabel = s => s==='paid'?'✅ Paid':s==='rejected'?'❌ Rejected':'⏳ Pending';

  return (
    <div className="fu" style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <div style={{textAlign:'center'}}>
        <h2 style={{fontSize:'26px',fontWeight:900,color:'white'}}>💸 Withdraw</h2>
        <p style={{fontSize:'13px',color:'rgba(148,163,184,0.45)',marginTop:'3px'}}>আপনার টাকা তুলুন</p>
      </div>

      <div style={{background:'rgba(34,197,94,0.07)',border:'1px solid rgba(34,197,94,0.22)',borderRadius:'18px',padding:'18px',textAlign:'center'}}>
        <p style={{fontSize:'11px',color:'rgba(134,239,172,0.6)',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:'4px'}}>Available Balance</p>
        <p style={{fontSize:'46px',fontWeight:900,color:'#22c55e',lineHeight:1}}>৳{fmt(bal)}</p>
        <p style={{fontSize:'11px',color:'rgba(148,163,184,0.4)',marginTop:'4px'}}>Minimum withdraw: ৳{CFG.MIN_WITHDRAW}</p>
      </div>

      <div style={{background:'rgba(245,158,11,0.06)',border:'1px solid rgba(245,158,11,0.22)',borderRadius:'20px',padding:'18px'}}>
        <p style={{fontWeight:700,color:'white',fontSize:'14px',marginBottom:'14px'}}>💳 Withdrawal Details</p>

        <div style={{marginBottom:'12px'}}>
          <label style={{fontSize:'11px',color:'rgba(148,163,184,0.5)',fontWeight:600,display:'block',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Payment Method</label>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px'}}>
            {methods.map(m => (
              <button key={m.id} className={`method-btn ${method===m.id?'sel':''}`}
                onClick={() => setMethod(m.id)}>
                {m.ic} {m.label}
              </button>
            ))}
          </div>
        </div>

        <div style={{marginBottom:'12px'}}>
          <label style={{fontSize:'11px',color:'rgba(148,163,184,0.5)',fontWeight:600,display:'block',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.05em'}}>
            {method === 'bank' ? 'Account Number' : 'Mobile Number'}
          </label>
          <input className="inp" value={account} onChange={e => setAccount(e.target.value)}
            placeholder={method==='bank' ? 'Account নম্বর' : '01XXXXXXXXX'}/>
        </div>

        <div style={{marginBottom:'16px'}}>
          <label style={{fontSize:'11px',color:'rgba(148,163,184,0.5)',fontWeight:600,display:'block',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.05em'}}>পরিমাণ (৳)</label>
          <input className="inp" type="number" min={CFG.MIN_WITHDRAW} max={bal}
            value={amount} onChange={e => setAmount(e.target.value)}
            placeholder={`৳${CFG.MIN_WITHDRAW} – ৳${fmt(bal)}`}/>
          <div style={{display:'flex',gap:'6px',marginTop:'8px',flexWrap:'wrap'}}>
            {[50,100,200,500].filter(v => v <= bal).map(v => (
              <button key={v} onClick={() => setAmount(String(v))}
                style={{padding:'4px 12px',borderRadius:'999px',border:'1px solid rgba(34,197,94,0.3)',background:'rgba(34,197,94,0.08)',color:'#86efac',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>
                ৳{v}
              </button>
            ))}
            {bal >= CFG.MIN_WITHDRAW && (
              <button onClick={() => setAmount(String(Math.floor(bal * 100) / 100))}
                style={{padding:'4px 12px',borderRadius:'999px',border:'1px solid rgba(245,158,11,0.3)',background:'rgba(245,158,11,0.08)',color:'#fbbf24',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>
                সব (৳{fmt(bal)})
              </button>
            )}
          </div>
        </div>

        <button className="btn-green" style={{width:'100%',padding:'15px',borderRadius:'16px',fontSize:'15px'}}
          onClick={doWithdraw} disabled={loading || bal < CFG.MIN_WITHDRAW}>
          {loading ? '⏳ Processing...' : '💸 Withdraw করো'}
        </button>

        {bal < CFG.MIN_WITHDRAW && (
          <p style={{textAlign:'center',fontSize:'12px',color:'rgba(239,68,68,0.7)',marginTop:'8px',fontWeight:600}}>
            আরো ৳{fmt(CFG.MIN_WITHDRAW - bal, 2)} Earn করলে Withdraw করতে পারবে
          </p>
        )}
      </div>

      {history.length > 0 && (
        <div className="glass" style={{borderRadius:'18px',overflow:'hidden'}}>
          <div style={{padding:'12px 16px',borderBottom:'1px solid rgba(255,255,255,0.05)',fontWeight:700,fontSize:'13px',color:'white',background:'rgba(34,197,94,0.05)'}}>
            📋 Withdraw History
          </div>
          {history.map(w => (
            <div key={w.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',borderBottom:'1px solid rgba(255,255,255,0.03)'}}>
              <div>
                <p style={{fontSize:'13px',color:'white',fontWeight:600,textTransform:'capitalize'}}>{w.method} — {w.account}</p>
                <p style={{fontSize:'11px',color:'rgba(148,163,184,0.45)',marginTop:'1px'}}>{ago(w.at)}</p>
              </div>
              <div style={{textAlign:'right'}}>
                <p style={{fontSize:'16px',fontWeight:800,color:'#fbbf24'}}>৳{fmt(w.amount)}</p>
                <p style={{fontSize:'10px',fontWeight:700,color:statusColor(w.status)}}>{statusLabel(w.status)}</p>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

          <p style={{fontWeight:700,color:'#fbbf24',fontSize:'14px',marginBottom:'10px'}}>🎟️ ব্যবহৃত Coupons</p>
          <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
            {usedCoupons.map(c => (
              <span key={c} style={{
                padding:'4px 14px',borderRadius:'999px',
                background:'rgba(245,158,11,0.1)',
                border:'1px solid rgba(245,158,11,0.35)',
                color:'#fbbf24',fontSize:'13px',fontWeight:800,letterSpacing:'0.08em',
              }}>{c} ✓</span>
            ))}
          </div>
        </div>
      )}

      {/* Ref code */}
      <div className="glass" style={{borderRadius:'18px',padding:'16px',textAlign:'center'}}>
        <p style={{fontSize:'11px',color:'rgba(148,163,184,0.45)',marginBottom:'6px'}}>তোমার Referral Code</p>
        <p style={{fontSize:'22px',fontWeight:900,color:'#60a5fa',letterSpacing:'0.12em'}}>{userData.refCode}</p>
      </div>
    </div>
  );
}

// LEADERBOARD PAGE
// ════════════════════════════════════
function LeaderboardPage({ userData }) {
  const [list,    setList]    = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      setLoading(true);
      const data = await dbLeaderboard();
      setList(data);
      setLoading(false);
    })();
  }, []);

  const medals = ['🥇','🥈','🥉'];

  return (
    <div className="fu" style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <div style={{textAlign:'center'}}>
        <h2 style={{fontSize:'26px',fontWeight:900,color:'white'}}>🏆 Leaderboard</h2>
        <p style={{fontSize:'13px',color:'rgba(148,163,184,0.45)',marginTop:'3px'}}>Top Earners</p>
      </div>

      {loading ? (
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {[...Array(8)].map((_,i) => <div key={i} className="sk" style={{height:'64px'}}/>)}
        </div>
      ) : list && list.length === 0 ? (
        <div style={{textAlign:'center',padding:'40px',color:'rgba(148,163,184,0.4)'}}>
          <p style={{fontSize:'40px',marginBottom:'10px'}}>😕</p>
          <p>এখনো কোনো user নেই</p>
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {/* Current user rank highlight */}
          {userData && list && (() => {
            const rank = list.findIndex(u => u.uid === userData.uid);
            if (rank === -1) return null;
            return (
              <div style={{
                background:'rgba(34,197,94,0.1)',
                border:'1px solid rgba(34,197,94,0.4)',
                borderRadius:'14px',padding:'10px 14px',
                display:'flex',alignItems:'center',gap:'8px',
                marginBottom:'4px',
              }}>
                <span style={{fontSize:'13px',color:'rgba(134,239,172,0.7)',fontWeight:700}}>
                  তোমার rank: #{rank+1}
                </span>
                <span style={{fontSize:'12px',color:'rgba(134,239,172,0.5)'}}>
                  — মোট Earned: ৳{fmt(userData.totalEarned||0)}
                </span>
              </div>
            );
          })()}

          {list.map((u, i) => {
            const isMe = userData && u.uid === userData.uid;
            return (
              <div key={u.uid || i} style={{
                display:'flex',alignItems:'center',gap:'12px',
                padding:'12px 14px',borderRadius:'16px',
                background: isMe
                  ? 'rgba(34,197,94,0.12)'
                  : i < 3
                    ? 'rgba(245,158,11,0.07)'
                    : 'rgba(255,255,255,0.03)',
                border: isMe
                  ? '1px solid rgba(34,197,94,0.45)'
                  : i < 3
                    ? '1px solid rgba(245,158,11,0.22)'
                    : '1px solid rgba(255,255,255,0.05)',
              }}>
                {/* Rank */}
                <div style={{
                  width:'36px',height:'36px',borderRadius:'50%',flexShrink:0,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  background: i < 3 ? 'rgba(245,158,11,0.15)' : 'rgba(255,255,255,0.05)',
                  fontSize: i < 3 ? '20px' : '13px',
                  fontWeight: 900,
                  color: i < 3 ? '#fbbf24' : 'rgba(148,163,184,0.5)',
                }}>
                  {i < 3 ? medals[i] : `#${i+1}`}
                </div>

                {/* Avatar */}
                {u.tgPhotoUrl ? (
                  <img src={u.tgPhotoUrl} alt="" style={{width:'40px',height:'40px',borderRadius:'50%',objectFit:'cover',border:'2px solid rgba(34,197,94,0.25)',flexShrink:0}}/>
                ) : (
                  <div style={{
                    width:'40px',height:'40px',borderRadius:'50%',flexShrink:0,
                    background:'linear-gradient(135deg,#15803d,#22c55e)',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    fontSize:'16px',fontWeight:900,color:'white',
                    border:'2px solid rgba(34,197,94,0.25)',
                  }}>
                    {(u.displayName||'U')[0].toUpperCase()}
                  </div>
                )}

                {/* Name & stats */}
                <div style={{flex:1,minWidth:0}}>
                  <p style={{
                    fontSize:'14px',fontWeight:700,color: isMe ? '#86efac' : 'white',
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                  }}>
                    {u.displayName || 'User'}{isMe ? ' (তুমি)' : ''}
                  </p>
                  <p style={{fontSize:'11px',color:'rgba(148,163,184,0.45)',marginTop:'2px'}}>
                    {u.adsWatchedTotal||0} ads · {u.refCount||0} refers
                  </p>
                </div>

                {/* Earned */}
                <div style={{textAlign:'right',flexShrink:0}}>
                  <p style={{fontSize:'17px',fontWeight:900,color:'#22c55e'}}>৳{fmt(u.totalEarned||0)}</p>
                  <p style={{fontSize:'10px',color:'rgba(148,163,184,0.4)'}}>মোট Earned</p>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════
// WITHDRAW HISTORY ALL USERS PAGE
// ════════════════════════════════════
function WdHistoryPage() {
  const [tab,     setTab]     = useState('pending'); // 'pending' | 'complete'
  const [list,    setList]    = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      setLoading(true);
      const data = await dbAllWithdraws();
      setList(data);
      setLoading(false);
    })();
  }, []);

  const statusColor = s => s==='paid'?'#22c55e':s==='rejected'?'#ef4444':'#f59e0b';
  const statusLabel = s => s==='paid'?'✅ Paid':s==='rejected'?'❌ Rejected':'⏳ Pending';

  // Method icon (no number shown)
  const methodIcon = m => {
    if (m==='bkash')  return '🩷 bKash';
    if (m==='nagad')  return '🧡 Nagad';
    if (m==='rocket') return '💙 Rocket';
    if (m==='bank')   return '🏦 Bank';
    return m;
  };

  const pending  = (list||[]).filter(w => w.status === 'pending');
  const complete = (list||[]).filter(w => w.status !== 'pending');
  const shown    = tab === 'pending' ? pending : complete;

  return (
    <div className="fu" style={{display:'flex',flexDirection:'column',gap:'14px'}}>
      <div style={{textAlign:'center'}}>
        <h2 style={{fontSize:'26px',fontWeight:900,color:'white'}}>📋 WD History</h2>
        <p style={{fontSize:'13px',color:'rgba(148,163,184,0.45)',marginTop:'3px'}}>সকল User এর Withdraw</p>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',gap:'8px',background:'rgba(255,255,255,0.04)',borderRadius:'14px',padding:'4px'}}>
        {[
          { id:'pending',  label:`⏳ Pending`,  count: (list||[]).filter(w=>w.status==='pending').length },
          { id:'complete', label:`✅ Complete`, count: (list||[]).filter(w=>w.status!=='pending').length },
        ].map(t => (
          <button key={t.id}
            onClick={() => setTab(t.id)}
            style={{
              flex:1,padding:'10px',borderRadius:'10px',fontSize:'13px',fontWeight:700,
              cursor:'pointer',border:'none',
              background: tab===t.id ? (t.id==='pending'?'rgba(245,158,11,0.18)':'rgba(34,197,94,0.18)') : 'transparent',
              color: tab===t.id ? (t.id==='pending'?'#fbbf24':'#86efac') : 'rgba(148,163,184,0.5)',
              transition:'all .2s',
            }}>
            {t.label}
            {list && (
              <span style={{
                marginLeft:'6px',
                padding:'2px 7px',borderRadius:'999px',fontSize:'11px',fontWeight:800,
                background: tab===t.id
                  ? (t.id==='pending'?'rgba(245,158,11,0.25)':'rgba(34,197,94,0.25)')
                  : 'rgba(255,255,255,0.08)',
                color: tab===t.id
                  ? (t.id==='pending'?'#fbbf24':'#86efac')
                  : 'rgba(148,163,184,0.5)',
              }}>{t.count}</span>
            )}
          </button>
        ))}
      </div>

      {loading ? (
        <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
          {[...Array(6)].map((_,i) => <div key={i} className="sk" style={{height:'72px'}}/>)}
        </div>
      ) : shown.length === 0 ? (
        <div style={{textAlign:'center',padding:'40px',color:'rgba(148,163,184,0.4)'}}>
          <p style={{fontSize:'36px',marginBottom:'10px'}}>{tab==='pending'?'🎉':'📭'}</p>
          <p>{tab==='pending' ? 'কোনো pending request নেই!' : 'কোনো completed withdraw নেই'}</p>
        </div>
      ) : (
        <div className="glass" style={{borderRadius:'18px',overflow:'hidden'}}>
          {shown.map((w, i) => (
            <div key={w.id||i} style={{
              display:'flex',justifyContent:'space-between',alignItems:'center',
              padding:'13px 16px',
              borderBottom: i < shown.length-1 ? '1px solid rgba(255,255,255,0.04)' : 'none',
              background: w.status==='pending' ? 'rgba(245,158,11,0.03)' : 'transparent',
            }}>
              <div style={{flex:1,minWidth:0}}>
                {/* User name */}
                <p style={{fontSize:'13px',color:'white',fontWeight:700,
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  👤 {w.displayName || 'User'}
                </p>
                {/* Method only — NO account number */}
                <p style={{fontSize:'12px',color:'rgba(148,163,184,0.55)',marginTop:'2px',fontWeight:600}}>
                  {methodIcon(w.method)}
                </p>
                <p style={{fontSize:'10px',color:'rgba(148,163,184,0.35)',marginTop:'1px'}}>
                  {w.at ? new Date(w.at).toLocaleString('bn-BD',{dateStyle:'short',timeStyle:'short'}) : '—'}
                </p>
              </div>
              <div style={{textAlign:'right',flexShrink:0,marginLeft:'12px'}}>
                <p style={{fontSize:'17px',fontWeight:900,color:'#fbbf24'}}>৳{fmt(w.amount)}</p>
                <p style={{fontSize:'11px',fontWeight:700,color:statusColor(w.status)}}>{statusLabel(w.status)}</p>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════
// MAIN APP
// ════════════════════════════════════
function App() {
  const [page,      setPage]      = useState('home');
  const [status,    setStatus]    = useState('loading');
  const [user,      setUser]      = useState(null);
  const [userData,  setUserData]  = useState(null);
  const { toasts, push } = useToast();

  useEffect(() => {
    if (TG) {
      TG.ready();
      TG.expand();
      TG.setHeaderColor('#030712');
      TG.setBackgroundColor('#030712');
    }
  }, []);

  useEffect(() => {
    (async () => {
      try {
        if (tgUser) {
          const u = await tgAuth(tgUser);
          setUser(u);
          let d = await dbGet(u.uid);
          setUserData(d);
          if (tgStartParam && d && !d.refBy) {
            const ok = await dbApplyRef(u.uid, tgStartParam);
            if (ok) {
              d = await dbGet(u.uid);
              setUserData(d);
              setTimeout(() => push(`🎁 Referral bonus! +৳${CFG.REF_BONUS} পেয়েছো!`, 'gold'), 900);
            }
          }
        } else {
          const demoId = localStorage.getItem('ae_demo_uid') || `demo_${Date.now()}`;
          localStorage.setItem('ae_demo_uid', demoId);
          let d = await dbGet(demoId);
          if (!d) {
            const demoEmail = `demo_${demoId}@adearn.app`;
            const demoPass  = `ADP_${demoId}`;
            let u;
            try {
              const c = await auth.createUserWithEmailAndPassword(demoEmail, demoPass);
              u = c.user;
            } catch {
              const c = await auth.signInWithEmailAndPassword(demoEmail, demoPass);
              u = c.user;
            }
            setUser(u);
            const demoTg = { id: demoId, first_name: 'Demo User', username: null, photo_url: null };
            d = await dbCreate(u.uid, demoTg);
          } else {
            try {
              const demoEmail = `demo_${demoId}@adearn.app`;
              const demoPass  = `ADP_${demoId}`;
              const c = await auth.signInWithEmailAndPassword(demoEmail, demoPass);
              setUser(c.user);
            } catch {}
          }
          setUserData(d);
        }
      } catch(err) {
        console.error('Auth error:', err);
        setUserData({
          uid:'local', displayName:'Demo User', balance:0,
          totalEarned:0, adsWatchedTotal:0, clicksEarned:0,
          adsThisRound:0, refCount:0, refEarned:0,
          totalWithdrawn:0, refCode:'REFDEMO1', withdrawHistory:[],
          adBtnClicks:0, invalidClicks:0, usedCoupons:[],
          joinedAt:Date.now(),
        });
      }
      setStatus('ready');
    })();
  }, []);

  const loadUser = useCallback(async () => {
    if (!user) return;
    const d = await dbGet(user.uid);
    if (d) setUserData(d);
  }, [user]);

  useEffect(() => {
    if (!user) return;
    const iv = setInterval(loadUser, 25000);
    return () => clearInterval(iv);
  }, [user, loadUser]);

  if (status === 'loading') return (
    <>
      <ParticleBG/>
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',zIndex:10}}>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:'64px',marginBottom:'16px',display:'inline-block',animation:'floatY 2s ease-in-out infinite'}}>💰</div>
          <div style={{width:'36px',height:'36px',border:'2px solid #22c55e',borderTopColor:'transparent',borderRadius:'50%',margin:'0 auto 12px',animation:'spin360 .8s linear infinite'}}/>
          <p style={{color:'rgba(148,163,184,0.45)',fontSize:'14px'}}>Loading AdEarn...</p>
        </div>
      </div>
    </>
  );

  const navItems = [
    { id:'home',      ic:'🏠', lb:'Home' },
    { id:'withdraw',  ic:'💸', lb:'Withdraw' },
    { id:'leaderboard', ic:'🏆', lb:'Top' },
    { id:'wdhistory', ic:'📋', lb:'WD List' },
    { id:'refer',     ic:'👥', lb:'Refer' },
    { id:'profile',   ic:'👤', lb:'Profile' },
  ];

  return (
    <>
      <ParticleBG/>

      <div className="toast-wrap">
        {toasts.map(t => (
          <div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>
        ))}
      </div>

      <div style={{position:'relative',zIndex:10,minHeight:'100vh',display:'flex',flexDirection:'column',maxWidth:'500px',margin:'0 auto'}}>

        {/* Topbar */}
        <div style={{position:'sticky',top:0,zIndex:30,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderBottom:'1px solid rgba(255,255,255,0.04)',background:'rgba(3,7,18,0.94)',backdropFilter:'blur(20px)'}}>
          <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
            <span style={{fontSize:'20px'}}>💰</span>
            <span style={{fontWeight:900,color:'white',fontSize:'18px'}}>AdEarn</span>
            <span className="badge">MONETAG</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
            {userData && (
              <div style={{display:'flex',alignItems:'center',gap:'5px',padding:'5px 12px',borderRadius:'999px',border:'1px solid rgba(34,197,94,0.28)',background:'rgba(34,197,94,0.07)'}}>
                <span style={{fontSize:'12px',fontWeight:900,color:'#22c55e'}}>৳{fmt(userData.balance||0)}</span>
              </div>
            )}
            {tgUser && userData?.tgPhotoUrl && (
              <img src={userData.tgPhotoUrl} alt="" style={{width:'32px',height:'32px',borderRadius:'50%',border:'2px solid rgba(34,197,94,0.4)',objectFit:'cover'}}/>
            )}
            {tgUser && !userData?.tgPhotoUrl && (
              <div style={{width:'32px',height:'32px',borderRadius:'50%',background:'linear-gradient(135deg,#15803d,#22c55e)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',fontWeight:900,color:'white',border:'2px solid rgba(34,197,94,0.4)'}}>
                {(userData?.displayName||'U')[0].toUpperCase()}
              </div>
            )}
          </div>
        </div>

        {/* Content */}
        <div style={{flex:1,overflowY:'auto',padding:'14px 14px 90px',scrollbarWidth:'thin'}}>
          {page==='home'        && <HomePage        userData={userData} user={user} onRefresh={loadUser} push={push}/>}
          {page==='withdraw'    && <WithdrawPage    userData={userData} user={user} onRefresh={loadUser} push={push}/>}
          {page==='leaderboard' && <LeaderboardPage userData={userData}/>}
          {page==='wdhistory'   && <WdHistoryPage/>}
          {page==='refer'       && <ReferPage       userData={userData} push={push}/>}
          {page==='profile'     && <ProfilePage     userData={userData}/>}
        </div>

        {/* Bottom Nav */}
        <div style={{position:'fixed',bottom:0,zIndex:30,padding:'8px 10px 10px',left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:'500px'}}>
          <div className="glass" style={{borderRadius:'20px',padding:'6px',display:'flex',gap:'4px',background:'rgba(3,7,18,0.97)',backdropFilter:'blur(20px)'}}>
            {navItems.map(n => (
              <button key={n.id} className={`nav-btn ${page===n.id?'active':''}`} onClick={() => setPage(n.id)}>
                <span style={{fontSize:'18px'}}>{n.ic}</span>
                <span style={{fontSize:'9px',fontWeight:600,color:page===n.id?'#22c55e':'rgba(100,116,139,0.7)'}}>{n.lb}</span>
              </button>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
